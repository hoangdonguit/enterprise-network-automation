name: CI — Lint & Syntax Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    name: Ansible Lint & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: pip install ansible ansible-lint

      - name: Create dummy inventory for syntax check
        run: |
          cat > inventory/hosts.yml << 'EOF'
          all:
            children:
              cisco_routers:
                hosts:
                  R1:
                    ansible_host: 172.17.0.11
                    ansible_user: admin
                    ansible_password: dummy
                    ansible_connection: network_cli
                    ansible_network_os: ios
                    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
                  R2:
                    ansible_host: 10.0.0.2
                    ansible_user: admin
                    ansible_password: dummy
                    ansible_connection: network_cli
                    ansible_network_os: ios
                    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
                  R3:
                    ansible_host: 10.0.0.6
                    ansible_user: admin
                    ansible_password: dummy
                    ansible_connection: network_cli
                    ansible_network_os: ios
                    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
          EOF

      - name: Syntax check playbook
        run: |
          ansible-playbook playbooks/backup_ios.yml \
            -i inventory/hosts.yml \
            --syntax-check

      - name: Verify repo structure
        run: |
          echo "=== Checking required files ==="
          test -f ansible.cfg              && echo "OK ansible.cfg"
          test -f .gitignore               && echo "OK .gitignore"
          test -f inventory/hosts.yml.example && echo "OK hosts.yml.example"
          test -f playbooks/backup_ios.yml && echo "OK playbook"
          echo "=== All checks passed ==="